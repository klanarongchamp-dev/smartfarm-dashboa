<!DOCTYPE html><html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Farm Pro</title><script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script><style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f6f9;
}

.header{
background:#2196F3;
color:#fff;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:450px;
margin:20px auto;
padding:15px;
}

.card{
background:#fff;
border-radius:15px;
padding:20px;
margin-bottom:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.status{
font-size:20px;
font-weight:bold;
text-align:center;
}

.online{
color:green;
}

.offline{
color:red;
}

.btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:18px;
color:white;
cursor:pointer;
margin-top:10px;
}

.on{
background:#28a745;
}

.off{
background:#dc3545;
}

.data{
font-size:18px;
margin-top:10px;
}
</style></head><body><div class="header">
🌱 Smart Farm Pro
</div><div class="container"><div class="card">
<div class="status">
NodeMCU :
<span id="nodeStatus" class="offline">OFFLINE</span>
</div>
</div><div class="card">
<h3>💧 ปั๊มน้ำ</h3><button class="btn on" onclick="pumpOn()">
🟢 เปิดปั๊ม
</button><button class="btn off" onclick="pumpOff()">
🔴 ปิดปั๊ม
</button><p class="data">
สถานะ :
<b id="pumpStatus">OFF</b>
</p>
</div><div class="card">
<h3>🕒 เวลา RTC</h3>
<p id="rtc">--:--:--</p>
</div></div><script>

const client = mqtt.connect(
'wss://650188a0ee2b4367b7c131fb385590a9.s1.eu.hivemq.cloud:8884/mqtt',
{
username:'smartfarm',
password:'Kla12345'
}
);

client.on('connect',()=>{

console.log('MQTT Connected');

client.subscribe('farm/pump/status');
client.subscribe('farm/time');
client.subscribe('farm/node/status');

});

client.on('message',(topic,message)=>{

const msg = message.toString();

if(topic === 'farm/pump/status')
{
document.getElementById('pumpStatus').innerHTML = msg;
}

if(topic === 'farm/time')
{
document.getElementById('rtc').innerHTML = msg;
}

if(topic === 'farm/node/status')
{
if(msg === 'ONLINE')
{
document.getElementById('nodeStatus').innerHTML='ONLINE';
document.getElementById('nodeStatus').className='online';
}
else
{
document.getElementById('nodeStatus').innerHTML='OFFLINE';
document.getElementById('nodeStatus').className='offline';
}
}

});

client.on('close',()=>{

document.getElementById('nodeStatus').innerHTML='OFFLINE';
document.getElementById('nodeStatus').className='offline';

});

function pumpOn()
{
client.publish('farm/pump','ON');
}

function pumpOff()
{
client.publish('farm/pump','OFF');
}

</script></body>
</html>
