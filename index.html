    <script>
        const UI = {
            showModal(content = "") {
                const modal = document.getElementById("modal");
                if (!modal) return;
                modal.innerHTML = content;
                modal.classList.remove("hidden");

            hideModal() {
                document.getElementById("modal")?.classList.add("hidden");
            },

            showError(title, message) {
                this.showModal(`

                        <button onclick="UI.hideModal()" class="w-full px-4 py-2 rounded-lg bg-red-600 hover:bg-red-700">ปิด</button>
                    </div>
                `);
            }
        };
