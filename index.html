<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>สวนลุงนะ ฟาร์ม</title>

<link rel="apple-touch-icon" href="logo_suanlungna.png">
<link rel="icon" type="image/png" href="logo_suanlungna.png">
<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="สวนลุงนะ">
<meta name="theme-color" content="#22c55e">

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
--green:#22c55e;
--dark:#14532d;
--bg:#f3f7f4;
--card:#ffffff;
--danger:#ef4444;
--shadow:0 8px 24px rgba(0,0,0,.08);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:var(--bg);
padding-bottom:40px;
}

.header{
background:linear-gradient(135deg,#14532d,#22c55e);
padding:30px 20px;
color:white;
text-align:center;
box-shadow:var(--shadow);
border-radius:0 0 25px 25px;
}

.header h1{
font-size:30px;
}

.header p{
margin-top:5px;
opacity:.9;
}

.container{
max-width:1200px;
margin:auto;
padding:15px;
}

.card{
background:var(--card);
border-radius:20px;
padding:20px;
margin-bottom:15px;
box-shadow:var(--shadow);
}

.card h3{
margin-bottom:15px;
color:var(--dark);
}

.status-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:12px;
margin-bottom:15px;
}

.status-card{
background:white;
padding:15px;
border-radius:18px;
text-align:center;
box-shadow:var(--shadow);
}

.status-card h4{
font-size:14px;
margin-bottom:8px;
color:#666;
}

.status-card b{
font-size:24px;
color:var(--dark);
}

.btn{
width:100%;
padding:15px;
border:none;
border-radius:15px;
font-size:17px;
font-weight:bold;
cursor:pointer;
color:white;
margin-bottom:10px;
}

.on{
background:var(--green);
}

.off{
background:var(--danger);
}

input,textarea{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #ddd;
font-size:15px;
}

textarea{
height:120px;
}

.task{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-bottom:1px solid #eee;
}

.task button{
background:var(--danger);
border:none;
padding:6px 10px;
border-radius:8px;
color:white;
}

.info{
line-height:2;
font-size:17px;
}

.online{
color:#22c55e;
font-weight:bold;
}

.offline{
color:#ef4444;
font-weight:bold;
}

canvas{
width:100%!important;
}

.logo{
width:100px;
height:100px;
object-fit:cover;
border-radius:50%;
background:white;
padding:6px;
margin-bottom:12px;
box-shadow:0 6px 20px rgba(0,0,0,.2);
border:4px solid rgba(255,255,255,.8);
}

@media(max-width:768px){
.header h1{
font-size:24px;
}
}

</style>
</head>

<body>

<div class="header">
<img src="logo_suanlungna.png" class="logo" alt="สวนลุงนะ ฟาร์ม">
<h1>🌱 สวนลุงนะ ฟาร์ม</h1>
<p>Smart Farm Dashboard V4</p>
</div>

<div class="container">


<div class="card">
<h3>💧 ควบคุมปั๊มน้ำ</h3>

<button class="btn on" onclick="pumpOn()">
🟢 เปิดปั๊ม
</button>

<button class="btn off" onclick="pumpOff()">
🔴 ปิดปั๊ม
</button>
</div>

<div class="card">
<h3>🌾 ข้อมูลพืช</h3>

<div class="info">
ชื่อพืช : <b>แตงกวา</b><br>
วันที่ปลูก : <b>25/05/2569</b><br>
อายุพืช : <b id="age"></b>
</div>

</div>

<div class="card">
<h3>📝 งานพรุ่งนี้</h3>

<input id="taskInput" placeholder="เพิ่มงาน">

<br><br>

<button class="btn on" onclick="addTask()">
เพิ่มงาน
</button>

<div id="tasks"></div>
</div>

<!DOCTYPE 

<div class="card"><h3>💰 รายรับ</h3><h2 id="income">0</h2></div>
<div class="card"><h3>💸 รายจ่าย</h3><h2 id="expense">0</h2></div>
<div class="card"><h3>📈 กำไร</h3><h2 id="profit">0</h2></div>
</div>

<div class="card">
<h3>เพิ่มรายการ</h3>
<input type="date" id="date">
<select id="type">
<option value="income">รายรับ</option>
<option value="expense">รายจ่าย</option>
</select>
<input type="text" id="name" placeholder="รายการ">
<input type="number" id="amount" placeholder="จำนวนเงิน">
<button onclick="addItem()">บันทึก</button>
</div>

<div class="card">
<h3>รายการทั้งหมด</h3>
<table>
<thead>
<tr>
<th>วันที่</th>
<th>ประเภท</th>
<th>รายการ</th>
<th>จำนวนเงิน</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>
</div>

<script>
let data = JSON.parse(localStorage.getItem("farmData")||"[]");

function save(){
 localStorage.setItem("farmData",JSON.stringify(data));
 render();
}

function addItem(){
 data.push({
   date:date.value,
   type:type.value,
   name:name.value,
   amount:Number(amount.value)
 });
 save();
}

function render(){
 let income=0,expense=0;
 tb.innerHTML="";
 data.forEach(r=>{
   if(r.type==="income") income+=r.amount;
   else expense+=r.amount;

   tb.innerHTML += `<tr>
   <td>${r.date}</td>
   <td>${r.type==="income"?"รายรับ":"รายจ่าย"}</td>
   <td>${r.name}</td>
   <td>${r.amount.toLocaleString()}</td>
   </tr>`;
 });

 document.getElementById("income").innerText=income.toLocaleString()+" บาท";
 document.getElementById("expense").innerText=expense.toLocaleString()+" บาท";
 document.getElementById("profit").innerText=(income-expense).toLocaleString()+" บาท";
}



<button class="btn on" onclick="saveNote()">
บันทึก
</button>
</div>



const client = mqtt.connect(
'wss://650188a0ee2b4367b7c131fb385590a9.s1.eu.hivemq.cloud:8884/mqtt',
{
username:'smartfarm',
password:'Kla12345',
reconnectPeriod:3000
}
);

client.on('connect',()=>{

document.getElementById('nodeStatus')
.innerHTML='ONLINE';

document.getElementById('nodeStatus')
.className='online';

client.subscribe('farm/pump/status');
client.subscribe('farm/node/status');
client.subscribe('farm/time');

client.subscribe('farm/temp');
client.subscribe('farm/soil');
client.subscribe('farm/hum');
client.subscribe('farm/light');

});

client.on('close',()=>{
offline();
});

client.on('error',()=>{
offline();
});

function offline(){

document.getElementById('nodeStatus')
.innerHTML='OFFLINE';

document.getElementById('nodeStatus')
.className='offline';

}

client.on('message',(topic,message)=>{

let msg=message.toString();

if(topic==='farm/pump/status')
document.getElementById('pumpStatus').innerHTML=msg;

if(topic==='farm/time')
document.getElementById('rtc').innerHTML=msg;

if(topic==='farm/node/status')
document.getElementById('nodeStatus').innerHTML=msg;

if(topic==='farm/temp'){
document.getElementById('temp').innerHTML=msg+'°C';
updateTempChart(Number(msg));
}

if(topic==='farm/soil')
document.getElementById('soil').innerHTML=msg+'%';

if(topic==='farm/hum')
document.getElementById('hum').innerHTML=msg+'%';

if(topic==='farm/light')
document.getElementById('light').innerHTML=msg;

});

function pumpOn(){
client.publish('farm/pump','ON');
}

function pumpOff(){
client.publish('farm/pump','OFF');
}

const plantDate = new Date('2026-05-25');

function updateAge(){

let diff=Math.floor(
(Date.now()-plantDate.getTime())
/86400000
);

document.getElementById('age')
.innerHTML=diff+' วัน';

}

updateAge();

const labels=[];
const data=[];

const chart = new Chart(
document.getElementById('tempChart'),
{
type:'line',
data:{
labels,
datasets:[{
label:'Temperature °C',
data,
fill:false,
tension:.4
}]
},
options:{
responsive:true
}
}
);

function updateTempChart(v){

labels.push(
new Date().toLocaleTimeString()
);

data.push(v);

if(labels.length>20){
labels.shift();
data.shift();
}

chart.update();

}

let tasks=
JSON.parse(localStorage.getItem('tasks')||'[]');

function renderTasks(){

let el=document.getElementById('tasks');

el.innerHTML='';

tasks.forEach((t,i)=>{

el.innerHTML+=`
<div class="task">
<span>${t}</span>
<button onclick="delTask(${i})">
ลบ
</button>
</div>
`;

});

localStorage.setItem(
'tasks',
JSON.stringify(tasks)
);

}

function addTask(){

let txt=
document.getElementById('taskInput').value;

if(txt.trim()){

tasks.push(txt);

renderTasks();

document.getElementById('taskInput').value='';

}

}

function delTask(i){

tasks.splice(i,1);

renderTasks();

}

renderTasks();

document.getElementById('note').value=
localStorage.getItem('farmNote')||'';

function saveNote(){

localStorage.setItem(
'farmNote',
document.getElementById('note').value
);

alert('บันทึกเรียบร้อย');

}

</script>

</body>
</html>
