 async function loadWeather(){

 const client=mqtt.connect(

 const plantDate=
new Date('2026-05-25');

function updateAge(){

const diff=
Math.floor(
(Date.now()-
plantDate.getTime())
/86400000
);

document.getElementById(
'age'
).innerHTML=

updateAge();
 const tempLabels=[];
const tempData=[];

const humLabels=[];
const humData=[];

const tempChart=
new Chart(
document.getElementById(
'tempChart'
),
{
type:'line',
data:{
labels:tempLabels,
datasets:[{
label:'Temperature',
data:tempData,
borderWidth:4,
fill:true
}]
}
}
);

const humChart=
new Chart(
document.getElementById(
'humChart'
),
{
type:'line',
data:{
labels:humLabels,
datasets:[{
label:'Humidity',
data:humData,
borderWidth:4,
fill:true
}]
}
}
);

function updateTempChart(v){

tempLabels.push(
new Date()
.toLocaleTimeString()
);

tempData.push(v);

if(tempLabels.length>20){

tempLabels.shift();
tempData.shift();

}

tempChart.update();

}

function updateHumChart(v){

humLabels.push(
new Date()
.toLocaleTimeString()
);

humData.push(v);

if(humLabels.length>20){

humLabels.shift();
humData.shift();

}

humChart.update();

}
 let tasks =
JSON.parse(
localStorage.getItem('tasks') || '[]'
);

function renderTasks(){

const el =
document.getElementById('tasks');

if(!el) return;

el.innerHTML='';

tasks.forEach((t,i)=>{

el.innerHTML += `

<div class="task-item">

<span>${t}</span>

<button
onclick="delTask(${i})">

🗑️

</button>

</div>

`;

});

localStorage.setItem(
'tasks',
JSON.stringify(tasks)
);

}

window.addTask=()=>{

const txt =
document.getElementById('taskInput').value;

if(!txt.trim()) return;

tasks.push(txt);

document.getElementById(
'taskInput'
).value='';

renderTasks();

};

window.delTask=(i)=>{

tasks.splice(i,1);

renderTasks();

};

renderTasks();
 const noteEl =
document.getElementById('note');

if(noteEl){

noteEl.value =
localStorage.getItem(
'farmNote'
) || '';

}

window.saveNote=()=>{

localStorage.setItem(
'farmNote',
document.getElementById(
'note'
).value
);

alert(
'บันทึกเรียบร้อย'
);

};
 let financeData =
JSON.parse(
localStorage.getItem(
'farmData'
) || '[]'
);

function saveFinance(){

localStorage.setItem(
'farmData',
JSON.stringify(
financeData
)
);

renderFinance();

}

window.addItem=()=>{

const date =
document.getElementById(
'date'
).value;

const type =
document.getElementById(
'type'
).value;

const name =
document.getElementById(
'name'
).value;

const amount =
Number(
document.getElementById(
'amount'
).value
);

if(
!date ||
!name ||
!amount
) return;

financeData.push({

date,
type,
name,
amount

});

saveFinance();

document.getElementById(
'name'
).value='';

document.getElementById(
'amount'
).value='';

};

window.deleteItem=(index)=>{

financeData.splice(
index,
1
);

saveFinance();

};

function renderFinance(){

let income=0;
let expense=0;

const tb=
document.getElementById(
'tb'
);

if(!tb) return;

tb.innerHTML='';

financeData.forEach(
(r,index)=>{

if(
r.type==='income'
)
income+=r.amount;
else
expense+=r.amount;

tb.innerHTML += `

<tr>

<td>${r.date}</td>

<td>
${r.type==='income'
?'💵 รายรับ'
:'💸 รายจ่าย'}
</td>

<td>${r.name}</td>

<td>
${r.amount.toLocaleString()}
</td>

<td>

<button
class="deleteBtn"
onclick="
deleteItem(${index})
">

🗑️

</button>

</td>

</tr>

`;

});

const profit =
income-expense;

document.getElementById(
'income'
).innerHTML =
income.toLocaleString()
+' บาท';

document.getElementById(
'expense'
).innerHTML =
expense.toLocaleString()
+' บาท';

document.getElementById(
'profit'
).innerHTML =
profit.toLocaleString()
+' บาท';

document.getElementById(
'totalItem'
).innerHTML =
financeData.length;

}

renderFinance();
