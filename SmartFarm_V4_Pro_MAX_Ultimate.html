
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartFarm V4 Pro MAX Ultimate</title>
<style>
body{font-family:Arial;margin:0;background:#f4f6f8}
header{background:#2e7d32;color:#fff;padding:15px;text-align:center}
.container{padding:15px}
.card{background:#fff;padding:15px;margin:10px 0;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,.1)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
button{padding:10px 15px;margin:5px}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:8px;text-align:center}
input,select{padding:8px;margin:5px}
</style>
</head>
<body>
<header>
<h1>🌱 SmartFarm V4 Pro MAX Ultimate</h1>
</header>

<div class="container">

<div class="grid">
<div class="card"><h3>🚿 ปั๊มน้ำ</h3><h2 id="pump">OFF</h2>
<button onclick="pumpOn()">เปิด</button>
<button onclick="pumpOff()">ปิด</button>
</div>

<div class="card"><h3>💰 รายรับ</h3><h2 id="income">0</h2></div>
<div class="card"><h3>💸 รายจ่าย</h3><h2 id="expense">0</h2></div>
<div class="card"><h3>📈 กำไร</h3><h2 id="profit">0</h2></div>
</div>

<div class="card">
<h3>เพิ่มรายการ</h3>
<input type="date" id="date">
<select id="type">
<option value="income">รายรับ</option>
<option value="expense">รายจ่าย</option>
</select>
<input type="text" id="name" placeholder="รายการ">
<input type="number" id="amount" placeholder="จำนวนเงิน">
<button onclick="addItem()">บันทึก</button>
</div>

<div class="card">
<h3>รายการทั้งหมด</h3>
<table>
<thead>
<tr>
<th>วันที่</th>
<th>ประเภท</th>
<th>รายการ</th>
<th>จำนวนเงิน</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>
</div>

<div class="card">
<h3>📡 MQTT Settings</h3>
<p>Topic ส่งคำสั่ง: farm/pump/set</p>
<p>Topic สถานะ: farm/pump/status</p>
<p>Broker: กำหนดใน mqtt.js ภายหลัง</p>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("farmData")||"[]");

function save(){
 localStorage.setItem("farmData",JSON.stringify(data));
 render();
}

function addItem(){
 data.push({
   date:date.value,
   type:type.value,
   name:name.value,
   amount:Number(amount.value)
 });
 save();
}

function render(){
 let income=0,expense=0;
 tb.innerHTML="";
 data.forEach(r=>{
   if(r.type==="income") income+=r.amount;
   else expense+=r.amount;

   tb.innerHTML += `<tr>
   <td>${r.date}</td>
   <td>${r.type==="income"?"รายรับ":"รายจ่าย"}</td>
   <td>${r.name}</td>
   <td>${r.amount.toLocaleString()}</td>
   </tr>`;
 });

 document.getElementById("income").innerText=income.toLocaleString()+" บาท";
 document.getElementById("expense").innerText=expense.toLocaleString()+" บาท";
 document.getElementById("profit").innerText=(income-expense).toLocaleString()+" บาท";
}

function pumpOn(){
 document.getElementById("pump").innerText="ON";
 console.log("MQTT => farm/pump/set : ON");
}

function pumpOff(){
 document.getElementById("pump").innerText="OFF";
 console.log("MQTT => farm/pump/set : OFF");
}

render();
</script>

</body>
</html>
